name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          # Skip if HEAD is already version-tagged
          if git tag --points-at HEAD | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "HEAD is already tagged, skipping release"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT="v0.1.0"
          else
            CURRENT="${LATEST_TAG#v}"
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)

            COMMIT_MSG=$(git log -1 --format='%B')

            if echo "$COMMIT_MSG" | grep -qE '^[a-z]+(\([^)]*\))?!:|^BREAKING[ _]CHANGE'; then
              NEXT="v$((MAJOR + 1)).0.0"
            elif echo "$COMMIT_MSG" | grep -qE '^feat(\([^)]*\))?:'; then
              NEXT="v${MAJOR}.$((MINOR + 1)).0"
            else
              NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi

          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next tag: $NEXT"

      - name: Push tag
        if: steps.version.outputs.tag != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate GitHub Release
        if: steps.version.outputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
