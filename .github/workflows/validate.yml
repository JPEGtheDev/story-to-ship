name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate hooks.json
        run: |
          jq empty hooks/hooks.json
          echo "[+] hooks.json is valid JSON"

      - name: Validate .claude-plugin JSON files
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json
          echo "[+] .claude-plugin/*.json are valid JSON"

      - name: Shellcheck hook scripts
        run: |
          shellcheck hooks/session-start.sh
          shellcheck hooks/pre-message-gates.sh
          shellcheck hooks/pre-message.sh
          echo "[+] All hook scripts pass shellcheck"

      - name: Enforce pre-message hook word budget
        run: |
          gates=$(wc -w < hooks/pre-message-gates.md)
          message=$(wc -w < hooks/pre-message.md)
          total=$((gates + message))
          echo "pre-message-gates.md: $gates words; pre-message.md: $message words; combined: $total (limit 400)"
          if [ "$total" -gt 400 ]; then
            echo "FAILED: combined pre-message hook word count $total exceeds 400"
            exit 1
          fi
          echo "[+] Combined pre-message hook injection is within the 400-word budget"

      - name: Check for broken references in skill files
        run: |
          set -e
          broken=0
          for f in skills/*/SKILL.md; do
            dir=$(dirname "$f")
            while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              target="$dir/$ref"
              if [ ! -f "$target" ]; then
                echo "BROKEN: $f references $ref (not found at $target)"
                broken=$((broken + 1))
              fi
            done < <(grep -o 'references/[A-Za-z0-9_./-]*\.md' "$f" | sort -u)
          done
          if [ "$broken" -gt 0 ]; then
            echo "Found $broken broken reference(s)"
            exit 1
          fi
          echo "[+] All skill references resolve to existing files"

      - name: Validate SKILL.md frontmatter
        run: |
          set -e
          for f in skills/*/SKILL.md; do
            name=$(sed -n 's/^name: \(.*\)$/\1/p' "$f" | head -1)
            desc=$(sed -n 's/^description: \(.*\)$/\1/p' "$f" | head -1)
            if [ -z "$name" ]; then
              echo "MISSING: $f has no 'name' field in frontmatter"
              exit 1
            fi
            if [ -z "$desc" ]; then
              echo "MISSING: $f has no 'description' field in frontmatter"
              exit 1
            fi
          done
          echo "[+] All SKILL.md files have required frontmatter (name, description)"

      - name: Check agent template contracts
        run: |
          set -e
          missing=0
          check() {
            file="$1"
            shift
            for s in "$@"; do
              if ! grep -qF -- "$s" "$file"; then
                printf 'FAILED: %s is missing required contract string: %s\n' "$file" "$s"
                missing=$((missing + 1))
              fi
            done
          }
          check agents/implementer.md "FINAL reply message" "Limitations:" "ASCII"
          check agents/code-quality-reviewer.md "Evidence Spot-Check" "IMPLEMENTER_EVIDENCE"
          check agents/skill-reviewer.md "IMPLEMENTER_EVIDENCE"
          check skills/writing-skills/references/REVIEW_INSTRUCTIONS.md "Evidence Spot-Check"
          check agents/postmortem-reviewer.md "Limitation-disclosure audit" "Evidence-spot-check audit" "Intent-canary audit" "Buried-caveat audit"
          check skills/execution/SKILL.md "## Canary"
          check skills/honesty/SKILL.md "buried caveat"
          if [ "$missing" -gt 0 ]; then
            printf 'Found %s missing contract string(s)\n' "$missing"
            exit 1
          fi
          echo "[+] All agent template contracts present"

      - name: Hook script smoke test
        run: |
          set -e
          for sh in hooks/*.sh; do
            md="${sh%.sh}.md"
            if [ -f "$md" ]; then
              echo "Smoke-testing $sh..."
              output=$(bash "$sh" 2>&1) || {
                echo "FAILED: $sh exited nonzero"
                exit 1
              }
              printf '%s\n' "$output" | jq empty || {
                echo "FAILED: $sh output is not valid JSON"
                printf 'Output was: %s\n' "$output"
                exit 1
              }
              case "$output" in
                *"[ERROR"*)
                  echo "FAILED: $sh emitted an error envelope"
                  printf 'Output was: %s\n' "$output"
                  exit 1
                  ;;
              esac
            fi
          done
          echo "[+] All hook scripts produce valid, error-free JSON"

      - name: Verify .claude/hooks symlink integrity
        run: |
          set -e
          broken=0
          for e in .claude/hooks/*; do
            if [ ! -L "$e" ]; then
              echo "FAILED: $e is not a symlink"
              broken=$((broken + 1))
              continue
            fi
            if [ ! -e "$e" ]; then
              echo "FAILED: $e is a dangling symlink"
              broken=$((broken + 1))
            fi
          done
          if [ "$broken" -gt 0 ]; then
            echo "Found $broken broken .claude/hooks entr(y/ies)"
            exit 1
          fi
          echo "[+] All .claude/hooks entries are intact symlinks"

      - name: Check hooks/README.md matches .claude/hooks
        run: |
          set -e
          drift=0
          bt='`'
          for e in .claude/hooks/*; do
            base=$(basename "$e")
            if ! grep -qF -- "${bt}${base}${bt}" hooks/README.md; then
              echo "DRIFT: $base exists in .claude/hooks but is not documented in hooks/README.md"
              drift=$((drift + 1))
            fi
          done
          n=$(find .claude/hooks -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')
          case "$n" in
            1) word=one ;;
            2) word=two ;;
            3) word=three ;;
            4) word=four ;;
            5) word=five ;;
            6) word=six ;;
            7) word=seven ;;
            8) word=eight ;;
            9) word=nine ;;
            10) word=ten ;;
            11) word=eleven ;;
            12) word=twelve ;;
            *) word="" ;;
          esac
          if [ -z "$word" ]; then
            echo "DRIFT: .claude/hooks has $n entries, outside the 1-12 word map in this gate -- update the gate in .github/workflows/validate.yml"
            drift=$((drift + 1))
          else
            if ! grep -qiwE "$word|$n" hooks/README.md; then
              echo "DRIFT: hooks/README.md does not state the current hook count ($n = '$word')"
              drift=$((drift + 1))
            fi
          fi
          if [ "$drift" -gt 0 ]; then
            echo "Found $drift hooks/README.md drift issue(s)"
            exit 1
          fi
          echo "[+] hooks/README.md matches the current .claude/hooks set and count"
